services:
  pokeapi:
    build: . #builder el dockerfile de esta carpeta
    image: backend:v1 #ponele "backend" de nombre a la img
    ports:
      - "3000:3000"
    depends_on:
      - db
      #env_file: ./.env
    environment:
      DB_HOST: "db",
      DB_PORT: "5432",
      DB_USER: postgres,
      DB_PASSWORD: post,
      DB_NAME: pokemones
  
  db:
    image: postgres:17
    environment:
     POSTGRES_USER: "postgres",
     POSTGRES_PASSWORD: "post",
     POSTGRES_DB: pokemones
    ports:
      - "5433:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
      # en produccion, no deberia cargar las seeds en el volumen (si los schemas), pero en dev si
      # idem con el 'ports de db'

